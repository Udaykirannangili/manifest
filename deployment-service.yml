---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bus
  template:
    metadata:
      labels:
        app: bus
    spec:
      containers:
      - name: bus
        image: shaikmustafa/paytm:bus
        ports:
        - containerPort: 3000   # Use port 3000

---
apiVersion: v1
kind: Service
metadata:
  name: bus-service
spec:
  selector:
    app: bus
  ports:
  - protocol: TCP
    port: 80                 # Expose port 80
    targetPort: 3000
  type: LoadBalancer
